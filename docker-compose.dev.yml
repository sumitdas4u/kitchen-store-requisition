services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kitchen_app
      POSTGRES_USER: kitchen
      POSTGRES_PASSWORD: kitchen_pass
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kitchen -d kitchen_app"]
      interval: 3s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 15

  deps:
    image: node:20-bookworm-slim
    working_dir: /app
    command: >
      sh -c "
        rm -f /app/.deps-ready &&
        echo 'Installing dependencies...' &&
        npm ci &&
        echo 'Dependencies installed' &&
        touch /app/.deps-ready
      "
    volumes:
      - ./:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
    restart: "no"

  backend:
    image: node:20-bookworm-slim
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "
        echo 'Waiting for dependencies...' &&
        while [ ! -f /app/.deps-ready ]; do sleep 1; done &&
        echo 'Starting backend...' &&
        npm --workspace apps/backend run start:dev
      "
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgresql://kitchen:kitchen_pass@postgres:5432/kitchen_app
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./:/app
      - root_node_modules:/app/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      deps:
        condition: service_completed_successfully

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    env_file:
      - .env
    command: >
      sh -c "
        echo 'Waiting for dependencies...' &&
        while [ ! -f /app/.deps-ready ]; do sleep 1; done &&
        echo 'Starting frontend...' &&
        npm --workspace apps/frontend run dev -- --hostname 0.0.0.0 -p 3000
      "
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./:/app
      - root_node_modules:/app/node_modules
      - frontend_node_modules:/app/apps/frontend/node_modules
      - backend_node_modules:/app/apps/backend/node_modules
    depends_on:
      deps:
        condition: service_completed_successfully
      backend:
        condition: service_started

volumes:
  pg_data:
  redis_data:
  root_node_modules:
  backend_node_modules:
  frontend_node_modules:
